<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FF4D00" />

  <!-- PWA iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="WorkoutPAL" />
  <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />

  <!-- PWA standard -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png" />

  <title>WorkoutPAL</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/screens.css" />
</head>
<body>

  <!-- App Shell -->
  <div id="app">

    <!-- Top Header -->
    <header id="app-header">
      <div class="header-inner">
        <div class="header-left">
          <span class="app-logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <rect width="28" height="28" rx="8" fill="var(--accent)"/>
              <path d="M5 14h3l2-5 4 10 3-7 2 4h4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="app-name">WorkoutPAL</span>
          </span>
        </div>
        <div class="header-right" id="header-actions">
          <!-- Dynamic actions injected per screen -->
        </div>
      </div>
    </header>

    <!-- Screen Container -->
    <main id="screen-container">

      <!-- ── HOME ── -->
      <section id="screen-home" class="screen active" data-screen="home">
        <div class="screen-scroll">
          <!-- Injected by home.js -->
        </div>
      </section>

      <!-- ── SESSION ── -->
      <section id="screen-session" class="screen" data-screen="session">
        <div class="screen-scroll">
          <!-- Injected by session.js -->
        </div>
      </section>

      <!-- ── HISTORY ── -->
      <section id="screen-history" class="screen" data-screen="history">
        <div class="screen-scroll">
          <!-- Injected by history.js -->
        </div>
      </section>

      <!-- ── PROFILE ── -->
      <section id="screen-profile" class="screen" data-screen="profile">
        <div class="screen-scroll">
          <!-- Injected by profile.js -->
        </div>
      </section>

      <!-- ── LIBRARY (no nav tab — sub-screen) ── -->
      <section id="screen-library" class="screen" data-screen="library">
        <div class="screen-scroll">
          <!-- Injected by library.js -->
        </div>
      </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <div class="nav-inner">

        <button class="nav-tab active" data-tab="home" aria-label="Accueil">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M3 9.5L11 3l8 6.5V19a1 1 0 01-1 1H6a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M8 20v-7h6v7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="nav-label">Accueil</span>
        </button>

        <button class="nav-tab" data-tab="session" aria-label="Séance">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <circle cx="11" cy="11" r="8.5" stroke="currentColor" stroke-width="1.8"/>
              <path d="M9 7.5l6 3.5-6 3.5V7.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="nav-label">Séance</span>
        </button>

        <button class="nav-tab" data-tab="history" aria-label="Historique">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <rect x="3" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <path d="M7 2v4M15 2v4M3 9h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M7 13h4M7 16h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Historique</span>
        </button>

        <button class="nav-tab" data-tab="profile" aria-label="Profil">
          <span class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <circle cx="11" cy="7.5" r="3.5" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 19c0-3.866 3.134-7 7-7h0c3.866 0 7 3.134 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="nav-label">Profil</span>
        </button>

      </div>
    </nav>

  </div><!-- /#app -->

  <!-- Scripts -->
  <script type="module" src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Failed:', err));
      });
    }
  </script>

</body>
</html>
